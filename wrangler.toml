name = "our-love-story"
main = "./worker/index.ts"
compatibility_date = "2026-07-18"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 30_000
subrequests = 1_000

[observability]
enabled = true
head_sampling_rate = 1

[assets]
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[images]
binding = "IMAGES"

[vars]
R2_ACCOUNT_ID = "3a80cbcb3a95b1fe9ad9765bdf9dc64e"
R2_BUCKET_NAME = "our-love-story-media"
CLERK_AUTHORIZED_PARTIES = "http://localhost:5173,https://our-love-story.xingalan1992.workers.dev,https://lucyandalan.com,https://www.lucyandalan.com"

[[d1_databases]]
binding = "DB"
database_name = "our-love-story"
database_id = "cfa763a8-284d-4a3d-845d-a88b8b759c66"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "our-love-story-media"
